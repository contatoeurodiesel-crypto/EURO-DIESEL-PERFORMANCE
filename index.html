<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL PERFORMANCE</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container" style="width: 300px;">
        <div class="logo">
            <span class="e-risco"></span>
            <span class="letra-e">E</span><span class="outras-letras">URO DIESEL</span>
        </div>
        
        <input type="text" id="user" placeholder="USUÁRIO">
        
        <div style="position: relative; width: 100%; display: flex; align-items: center;">
            <input type="password" id="pass" placeholder="SENHA" style="width: 100%; padding-right: 80px;">
            <button type="button" id="btnMostrar" onclick="toggleSenha()" 
                style="position: absolute; right: 5px; border: none; background: transparent; color: #888; cursor: pointer; font-size: 10px; font-weight: bold;">
                MOSTRAR
            </button>
        </div>

        <button onclick="login()" style="margin-top: 10px;">ENTRAR</button>
        <a href="inscrever.html">INSCREVA-SE</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
