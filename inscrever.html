<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Euro Diesel</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="assets/images/logo.png" alt="EURO DIESEL" style="width: 100%; max-width: 320px; height: auto;">
        </div>
        
        <input type="text" id="nome" placeholder="NOME COMPLETO">
        <input type="text" id="user" placeholder="USUÁRIO">
        <input type="password" id="pass" placeholder="SENHA">
        
        <select id="ddi" style="width: 100%; padding: 12px; margin: 6px 0; background: #000; border: 1px solid #E7272D; color: #fff;">
            <option value="+55">+55 (BRASIL)</option>
            <option value="+1">+1 (EUA)</option>
            <option value="+351">+351 (PORTUGAL)</option>
        </select>
        <input type="tel" id="telefone" placeholder="WHATSAPP (SOMENTE NÚMEROS)">

        <button onclick="cadastrarComToken()">CADASTRAR E GERAR TOKEN</button>
        <a href="index.html">VOLTAR AO LOGIN</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
